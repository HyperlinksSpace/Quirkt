<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quirkt — Quantum Playground</title>
    <meta
      name="description"
      content="Three quantum games for everyone — run live on Railway, play in your browser."
    />
    <link rel="stylesheet" href="./assets/css/playground.css" />
    <script>
      globalThis.QUIRKT_DEFAULT_API = "https://quirkt-production.up.railway.app";
    </script>
  </head>
  <body>
    <nav class="lang-switcher" aria-label="Language">
      <button type="button" class="lang-btn active" data-lang="en">EN</button>
      <button type="button" class="lang-btn" data-lang="ru">РУ</button>
      <button type="button" class="lang-btn" data-lang="zh">中文</button>
    </nav>

    <header class="hero">
      <h1 id="hero-title">Quirkt Quantum Playground</h1>
      <p id="hero-lead"></p>
      <div class="badges">
        <span id="badge-live" class="badge">Live quantum computer</span>
        <span id="badge-ready" class="badge ok">Ready to play</span>
        <span id="api-status-badge" class="badge warn">Connecting…</span>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2 id="sidebar-demos-label">Pick a game</h2>
        <nav id="demo-list"></nav>
      </aside>

      <section>
        <article class="panel">
          <h2 id="demo-title">—</h2>
          <p id="demo-desc" class="demo-desc"></p>
          <div class="controls">
            <button id="run-again-btn" class="primary" type="button">Run again</button>
            <span id="run-status-badge" class="badge">—</span>
          </div>
          <svg id="circuit-svg" aria-label="Circuit diagram"></svg>
        </article>

        <div class="grid-2">
          <article class="panel">
            <h2 id="hist-title">Results chart</h2>
            <p id="hist-hint" class="panel-hint"></p>
            <canvas id="hist-canvas"></canvas>
            <div id="metrics" class="metrics"></div>
          </article>
          <article class="panel">
            <h2 id="bloch-title">Tiny quantum arrow</h2>
            <p id="bloch-hint" class="panel-hint"></p>
            <canvas id="bloch-canvas"></canvas>
          </article>
        </div>

        <article class="panel" id="portfolio-panel" hidden>
          <h2 id="portfolio-title">How to split your coins</h2>
          <p id="portfolio-hint" class="panel-hint"></p>
          <canvas id="portfolio-canvas"></canvas>
        </article>

        <article class="panel">
          <h2 id="integration-title">Where this helps in real apps</h2>
          <div id="integration-panel"></div>
        </article>

        <article class="panel">
          <h2 id="roadmap-title">What comes next</h2>
          <ul id="roadmap-list" class="integration-hooks"></ul>
        </article>
      </section>
    </main>

    <script type="module" src="./assets/js/playground.js?v=3"></script>
  </body>
</html>
