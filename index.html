<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quirkt — Quantum Playground</title>
    <meta
      name="description"
      content="Live Qiskit demos: quantum oracle, portfolio sampler, and Grover swap search for Hyperlinks Space Program."
    />
    <link rel="stylesheet" href="./assets/css/playground.css" />
    <script>
      globalThis.QUIRKT_DEFAULT_API = "https://quirkt-production.up.railway.app";
    </script>
  </head>
  <body>
    <nav class="lang-switcher" aria-label="Language">
      <button type="button" class="lang-btn active" data-lang="en">EN</button>
      <button type="button" class="lang-btn" data-lang="ru">РУ</button>
      <button type="button" class="lang-btn" data-lang="zh">中文</button>
    </nav>

    <header class="hero">
      <h1 id="hero-title">Quirkt Quantum Playground</h1>
      <p id="hero-lead"></p>
      <div class="badges">
        <span id="badge-live" class="badge">Live Qiskit (Railway)</span>
        <span id="badge-ready" class="badge ok">Ready</span>
        <span id="api-status-badge" class="badge warn">Connecting…</span>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2 id="sidebar-demos-label">Circuits</h2>
        <nav id="demo-list"></nav>
      </aside>

      <section class="main-column">
        <article class="panel play-panel">
          <h2 id="demo-title">—</h2>
          <div class="controls">
            <button id="run-again-btn" class="primary" type="button">Run again</button>
            <span id="run-status-badge" class="badge">—</span>
          </div>

          <div id="results-section" class="results-section">
            <div class="grid-2 results-grid">
              <div class="results-block">
                <h3 id="hist-title">Measurement histogram</h3>
                <p id="hist-hint" class="panel-hint"></p>
                <canvas id="hist-canvas"></canvas>
                <div id="metrics" class="metrics"></div>
              </div>
              <div class="results-block">
                <h3 id="bloch-title">Bloch sphere (qubit 0)</h3>
                <p id="bloch-hint" class="panel-hint"></p>
                <canvas id="bloch-canvas"></canvas>
              </div>
            </div>

            <div id="portfolio-panel" class="results-block portfolio-block" hidden>
              <h3 id="portfolio-title">Portfolio weights</h3>
              <p id="portfolio-hint" class="panel-hint"></p>
              <canvas id="portfolio-canvas"></canvas>
            </div>
          </div>

          <p id="demo-desc" class="demo-desc"></p>
          <svg id="circuit-svg" aria-label="Circuit diagram"></svg>
        </article>

        <article class="panel">
          <h2 id="integration-title">Hyperlinks Space Program integration</h2>
          <div id="integration-panel"></div>
        </article>

        <article class="panel">
          <h2 id="roadmap-title">Roadmap</h2>
          <ul id="roadmap-list" class="integration-hooks"></ul>
        </article>
      </section>
    </main>

    <script type="module" src="./assets/js/playground.js?v=5"></script>
  </body>
</html>
